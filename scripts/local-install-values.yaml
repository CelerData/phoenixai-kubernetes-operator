# Operator and FE/BE images are NOT overridden here on purpose: the chart's
# own defaults already point at the recommended versions for this release.
celerdata:
  celerDataFeSpec:
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 1
        memory: 2Gi
    service:
      type: NodePort
      ports:
      - name: query   # fill the name from the fe service ports
        containerPort: 9030
        nodePort: 30002
        port: 9030
  celerDataBeSpec:
    resources:
      limits:
        cpu: 2
        memory: 4Gi
      requests:
        cpu: 1
        memory: 2Gi
  celerDataFeProxySpec:
    enabled: true
    service:
      type: NodePort
      ports:
      - name: http-port   # fill the name from the fe proxy service ports
        nodePort: 30001
        containerPort: 8080
        port: 8080        
